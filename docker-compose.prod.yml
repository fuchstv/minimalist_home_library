services:
  database:
    image: mysql:8.0
    container_name: library_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - library_net

  backend:
    build: ./backend
    container_name: library_backend
    restart: always
    environment:
      - DB_HOST=database
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
    volumes:
      - ./backend:/var/www/html
      - uploads_data:/var/www/html/uploads
    networks:
      - library_net
    depends_on:
      - database

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: library_admin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=database
    networks:
      - library_net
    depends_on:
      - database

  caddy:
    image: caddy:2-alpine
    container_name: library_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/caddy
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - library_net
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  library_net:
