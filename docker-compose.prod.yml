services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-library_user}
      - DB_PASS=${DB_PASS:-library_pass}
      - DB_NAME=${DB_NAME:-library_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

  db:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${DB_NAME:-library_db}
      MYSQL_USER: ${DB_USER:-library_user}
      MYSQL_PASSWORD: ${DB_PASS:-library_pass}
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql

volumes:
  db_data:
  uploads_data:
